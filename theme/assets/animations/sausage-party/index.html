<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Dachshund Levels</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="page">
    <section class="scene phase-a" id="scene" aria-label="Бесконечная такса по уровням">
      <div class="frame" id="frame">
        <div class="guides" id="guides" aria-hidden="true"></div>

        <div class="body-stripes" id="bodyStripes" aria-hidden="true"></div>
        <div class="track-text" id="trackText" aria-hidden="true">SAUSAGE PARTY</div>
        <div class="welcome-text" aria-hidden="true">
          <div class="welcome-main">
            <span class="welcome-letter">W</span>
            <span class="welcome-letter">E</span>
            <span class="welcome-letter">L</span>
            <span class="welcome-letter">C</span>
            <span class="welcome-letter">O</span>
            <span class="welcome-letter">M</span>
            <span class="welcome-letter">E</span>
          </div>
        </div>
        <span class="welcome-to">to</span>
        <div class="signature-text" aria-hidden="true">* Bring Your Own Sausages</div>

        <div class="runner head-runner" id="headRunner" aria-hidden="true"></div>
        <div class="runner rear-runner" id="rearRunner" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>

</html>
