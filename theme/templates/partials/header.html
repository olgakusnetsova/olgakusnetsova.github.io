        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="icon icon-open" viewBox="0 0 16 16" aria-hidden="true" focusable="false">

        <a class="search-link" href="{{ .BaseURL }}/search">Поиск</a>

</header>
